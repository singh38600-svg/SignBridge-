<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBridge MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <!-- Switched to Hands Only for 70% faster performance on mobile -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        h1 { color: #0d47a1; }
        #video { width: 100%; max-width: 640px; border: 4px solid #0d47a1; border-radius: 8px; transform: scaleX(-1); }
        .prediction-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 640px; margin: 20px auto; }
        .sign { font-size: 2em; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>SignBridge MVP</h1>
    <h2 id="status" style="color: #d32f2f;">Initializing...</h2>
    
    <video id="video" autoplay playsinline muted></video>
    
    <div class="prediction-box">
        <div>Prediction: <span id="prediction" class="sign">None</span></div>
        <div>Confidence: <span id="confidence">0%</span></div>
    </div>

    <script>
        const SIGNS = ['Bear', 'Break', 'Brinjal', 'Budget', 'Busy', 'Cabbage', 'Carrot', 'Cauliflower', 'Chilli', 'Clean', 'Close', 'Come', 'Cook', 'Crocodile', 'Cry', 'Cucumber', 'Deer', 'Drink', 'Elephant', 'Exam', 'Fedup', 'Fever', 'Giraffe', 'Give', 'Good Morning', 'Good afternoon', 'Hello', 'Hug', 'Injury', 'Interview', 'Jump', 'Karnataka', 'Key', 'Knife', 'Lemon', 'Lion', 'Man', 'Maths', 'Maybe', 'Monkey', 'Onion', 'Peacock', 'Pigeon', 'Pour', 'Radish', 'Sample Videos', 'Sparrow', 'Still', 'Switch', 'Tea', 'Temple', 'Thank you', 'Tiger', 'Turtle', 'Umbrella', 'Uncle', 'Vegetables', 'Volcano', 'What is your Name', 'Wife', 'Writer', 'Wrong'];
        const SEQUENCE_LENGTH = 30;
        let model = null;
        let sequenceBuffer = [];
        let isPredicting = false;

        function setStatus(msg, color = "#d32f2f") {
            document.getElementById('status').innerText = msg;
            document.getElementById('status').style.color = color;
        }

        async function init() {
            try {
                setStatus("1. Requesting camera access...");
                const video = document.getElementById('video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve);
                    };
                });
                setStatus("2. Camera ready! Loading AI Model...", "#f57c00");
            } catch (e) {
                setStatus("Camera Error: " + e.message, "#d32f2f");
                return;
            }

            try {
                model = await tf.loadLayersModel('./model.json');
                setStatus("3. Model loaded! Starting Hand Tracker...", "#f57c00");
            } catch (err) {
                setStatus("Model Error: " + err.message, "#d32f2f");
                return;
            }

            try {
                const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                hands.onResults(onResults);

                const video = document.getElementById('video');
                
                // Use requestAnimationFrame for smooth 30fps capture, but lock prediction to prevent freeze
                const processFrame = async () => {
                    if (video.readyState >= 2) {
                        await hands.send({ image: video });
                    }
                    requestAnimationFrame(processFrame);
                };
                processFrame();
                setStatus("4. App Ready! Sign to the camera.", "#2e7d32");
            } catch (e) {
                setStatus("Tracker Error: " + e.message, "#d32f2f");
            }
        }

        function onResults(results) {
            // Default empty arrays for 2 hands (21 landmarks * 3 coords = 63 each)
            let leftHand = Array(63).fill(0);
            let rightHand = Array(63).fill(0);

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    let landmarks = results.multiHandLandmarks[i].flatMap(c => [c.x, c.y, c.z]);
                    let label = results.multiHandedness[i].label;
                    
                    // MediaPipe labels are reversed because the video is mirrored
                    if (label === 'Left') {
                        rightHand = landmarks; 
                    } else {
                        leftHand = landmarks;
                    }
                }
            }

            const landmarksCombined = [...leftHand, ...rightHand];

            sequenceBuffer.push(landmarksCombined);
            if (sequenceBuffer.length > SEQUENCE_LENGTH) sequenceBuffer.shift();

            // Predict only if buffer is full AND previous prediction is done
            if (sequenceBuffer.length === SEQUENCE_LENGTH && model && !isPredicting) {
                isPredicting = true;
                predictSign([...sequenceBuffer]); 
            }
        }

        async function predictSign(sequence) {
            try {
                const inputTensor = tf.tensor3d([sequence], [1, SEQUENCE_LENGTH, 126]);
                const prediction = model.predict(inputTensor);
                const data = await prediction.data();
                
                const maxIndex = data.indexOf(Math.max(...data));
                const maxConfidence = data[maxIndex];
                
                if (maxConfidence > 0.4) {
                    document.getElementById('prediction').innerText = SIGNS[maxIndex] || 'Unknown';
                    document.getElementById('confidence').innerText = (maxConfidence * 100).toFixed(2) + '%';
                }
                
                inputTensor.dispose();
                prediction.dispose();
            } catch (err) {
                console.error(err);
            } finally {
                isPredicting = false; // Unlock for next prediction
            }
        }
        init();
    </script>
</body>
</html>
