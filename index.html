<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBridge MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        h1 { color: #0d47a1; }
        #canvas { width: 100%; max-width: 640px; border: 4px solid #0d47a1; border-radius: 8px; }
        .prediction-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 640px; margin: 20px auto; }
        .sign { font-size: 2em; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>SignBridge MVP</h1>
    <h2 id="status" style="color: #d32f2f;">Initializing...</h2>
    
    <video id="video" style="width: 1px; height: 1px; position: absolute; left: -9999px;" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    
    <div class="prediction-box">
        <div>Prediction: <span id="prediction" class="sign">None</span></div>
        <div>Confidence: <span id="confidence">0%</span></div>
    </div>

    <script>
        const SIGNS = ['Bear', 'Break', 'Brinjal', 'Budget', 'Busy', 'Cabbage', 'Carrot', 'Cauliflower', 'Chilli', 'Clean', 'Close', 'Come', 'Cook', 'Crocodile', 'Cry', 'Cucumber', 'Deer', 'Drink', 'Elephant', 'Exam', 'Fedup', 'Fever', 'Giraffe', 'Give', 'Good Morning', 'Good afternoon', 'Hello', 'Hug', 'Injury', 'Interview', 'Jump', 'Karnataka', 'Key', 'Knife', 'Lemon', 'Lion', 'Man', 'Maths', 'Maybe', 'Monkey', 'Onion', 'Peacock', 'Pigeon', 'Pour', 'Radish', 'Sample Videos', 'Sparrow', 'Still', 'Switch', 'Tea', 'Temple', 'Thank you', 'Tiger', 'Turtle', 'Umbrella', 'Uncle', 'Vegetables', 'Volcano', 'What is your Name', 'Wife', 'Writer', 'Wrong'];
        const SEQUENCE_LENGTH = 30;
        let model = null;
        let sequenceBuffer = [];

        function setStatus(msg, color = "#d32f2f") {
            document.getElementById('status').innerText = msg;
            document.getElementById('status').style.color = color;
        }

        async function init() {
            try {
                setStatus("1. Requesting camera access...");
                const video = document.getElementById('video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve);
                    };
                });
                setStatus("2. Camera ready! Loading AI Model...", "#f57c00");
            } catch (e) {
                setStatus("Camera Error: " + e.message, "#d32f2f");
                return;
            }

            try {
                model = await tf.loadLayersModel('./model.json');
                setStatus("3. Model loaded! Starting MediaPipe...", "#f57c00");
            } catch (err) {
                setStatus("Model Error: " + err.message, "#d32f2f");
                return;
            }

            try {
                const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
                holistic.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                holistic.onResults(onResults);

                const video = document.getElementById('video');
                const processFrame = async () => {
                    if (video.readyState >= 2) {
                        await holistic.send({ image: video });
                    }
                    requestAnimationFrame(processFrame);
                };
                processFrame();
                setStatus("4. App Ready! Sign to the camera.", "#2e7d32");
            } catch (e) {
                setStatus("MediaPipe Error: " + e.message, "#d32f2f");
            }
        }

        function onResults(results) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0,0, canvas.width, canvas.height);
            ctx.restore();

            const extractHand = (hand) => {
                if (!hand) return Array(63).fill(0);
                return hand.landmarks.flatMap(coord => [coord.x, coord.y, coord.z]);
            };

            const leftHand = extractHand(results.leftHandLandmarks);
            const rightHand = extractHand(results.rightHandLandmarks);
            const landmarks = [...leftHand, ...rightHand];

            sequenceBuffer.push(landmarks);
            if (sequenceBuffer.length > SEQUENCE_LENGTH) sequenceBuffer.shift();

            if (sequenceBuffer.length === SEQUENCE_LENGTH && model) {
                predictSign(sequenceBuffer);
            }
        }

        async function predictSign(sequence) {
            try {
                const inputTensor = tf.tensor3d([sequence], [1, SEQUENCE_LENGTH, 126]);
                const prediction = model.predict(inputTensor);
                const data = await prediction.data();
                
                const maxIndex = data.indexOf(Math.max(...data));
                const maxConfidence = data[maxIndex];
                
                if (maxConfidence > 0.5) { 
                    document.getElementById('prediction').innerText = SIGNS[maxIndex] || 'Unknown';
                    document.getElementById('confidence').innerText = (maxConfidence * 100).toFixed(2) + '%';
                }
                
                inputTensor.dispose();
                prediction.dispose();
            } catch (err) {
                console.error(err);
            }
        }
        init();
    </script>
</body>
</html>
